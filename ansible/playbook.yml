---
- name: Deploy Local Magazine website
  hosts: web
  become: yes
  vars:
    container_name: local-magazine
    container_port: 80
    host_port: 80

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - python3-pip
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
        state: present

    - name: Update apt cache again
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker-ce
        state: present

    - name: Install Docker Python module
      pip:
        name: docker
        state: present

    - name: Start Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Create directory for website files
      file:
        path: /var/www/local-magazine
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: Copy HTML files to server
      copy:
        src: "{{ item }}"
        dest: /var/www/local-magazine/
        mode: '0644'
        owner: root
        group: root
      loop:
        - "../frontend/index.html"
        - "../frontend/article.html"
        - "../frontend/about.html"
      delegate_to: localhost

    - name: Copy CSS directory to server
      copy:
        src: "../frontend/css"
        dest: /var/www/local-magazine/
        mode: '0755'
        owner: root
        group: root
      delegate_to: localhost

    - name: Copy images directory to server
      copy:
        src: "../frontend/images"
        dest: /var/www/local-magazine/
        mode: '0755'
        owner: root
        group: root
      delegate_to: localhost

    - name: Stop and remove existing container if running
      docker_container:
        name: "{{ container_name }}"
        state: absent
        force_kill: yes
      ignore_errors: yes

    - name: Run Docker container with website
      docker_container:
        name: "{{ container_name }}"
        image: nginx:alpine
        state: started
        restart_policy: always
        ports:
          - "{{ host_port }}:{{ container_port }}"
        volumes:
          - /var/www/local-magazine:/usr/share/nginx/html:ro
